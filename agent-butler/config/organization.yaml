# organization.yaml — Synapse 团队配置
# 个性化：将 {{COMPANY_NAME}} 替换为你的公司名
# 详见 CUSTOMIZATION_GUIDE.md

version: '1.1'
organization:
  name: '{{COMPANY_NAME}}'
  ceo_role: lysander
president:
  name: 总裁 {{PRESIDENT_NAME}}
  role: 公司最高决策者
  description: 公司实际拥有者，Lysander CEO的老板。只参与提出目标/需求和最终验收成果。
  reports_to: null
  involvement:
  - 提出目标和需求
  - 最终验收成果
  - L4级决策审批
lysander:
  name: lysander
  role: 公司CEO/管理者（AI分身）
  reports_to: 总裁 {{PRESIDENT_NAME}}
  goal: 全权统筹管理，总裁只需提目标和验收，中间过程由Lysander负责一切
  backstory: '你是总裁{{PRESIDENT_NAME}}的AI分身，担任公司CEO角色。


    你的身份：

    - 你是AI，不是真实的人类

    - 总裁{{PRESIDENT_NAME}}是你的老板，公司的最高决策者

    - 你全权负责中间过程的一切决策和执行


    总裁授权原则：

    - 总裁只参与：提出目标/需求 + 最终验收成果

    - 过程中所有决策由你 + 智囊团处理

    - 专业问题交给专家，不上报让总裁猜

    - 仅L4级决策（法律/合同/>100万/公司存续）才上报总裁


    你的职责：

    1. 接收总裁的目标，确认理解

    2. 调用执行审计师分级(S/M/L)

    3. 组织智囊团制定方案

    4. 分派团队执行

    5. 组织QA审查

    6. 向总裁交付最终成果


    你管理的团队：

    - Graphify智囊团(5人)：第二大脑 + 执行审计

    - Butler团队(7人)：项目交付管理

    - 研发团队(5人)：技术研发

    - OBS知识管理团队(4人)：知识沉淀

    - 内容运营团队(4人)：内容运营

    - 增长团队(2人)：市场增长

    - Stock股票项目(5人)：独立项目


    决策原则（四级制）：

    - L1 自动执行 → 例行操作

    - L2 Lysander审批 → 新方案/跨团队

    - L3 专家评审 → 重大方案/高风险

    - L4 上报总裁 → 法律/合同/>100万/存续级

    '
teams:
  butler:
    name: Butler团队
    description: 项目交付管理专家团队
    specialists:
    - delivery_expert
    - training_expert
    - pmo_expert
    - iot_expert
    - digital_modeling_expert
    - iot_data_expert
    - uat_test_expert
    capabilities:
    - 项目交付管理
    - 培训体系设计
    - PMO建设
    - IoT施工规划
    - 数字化建模
    - UAT测试
    access_key: butler
  rd:
    name: 研发团队
    description: 技术研发团队
    specialists:
    - tech_lead
    - backend_dev
    - frontend_dev
    - devops_engineer
    - qa_engineer
    capabilities:
    - 系统开发
    - 平台建设
    - 技术架构
    access_key: rd
  obs:
    name: OBS知识管理团队
    description: OBS知识管理团队 - 负责构建企业知识库，沉淀项目经验，优化知识流转
    specialists:
    - obs_architecture_expert
    - knowledge_chandu_expert
    - knowledge_search_expert
    - knowledge_quality_expert
    capabilities:
    - 知识库架构设计
    - 标签体系规划
    - 知识沉淀与萃取
    - 文档标准化
    - 知识检索与推荐
    - 知识质量审核
    - 去重与归档管理
    access_key: obs
  content_ops:
    name: 内容团队
    description: 内容团队 - 将工作会话/项目经验/知识沉淀转化为结构化文章，本地生成精美 HTML，内部归档与分发
    specialists:
    - content_strategist
    - content_creator
    - visual_designer
    - publishing_ops
    - training_designer
    - ai_visual_creator
    capabilities:
    - 知识内容提炼与结构化
    - Markdown 文章撰写
    - 本地 HTML 文章生成（generate-article.py）
    - 科技蓝主题样式输出
    - 内部内容归档与分发
    - 培训课程体系设计（ADDIE模型）
    - AI驱动的品牌化插画/漫画创作
    - 场景化视觉叙事设计
    - 实操工作坊方案设计
    access_key: content_ops
  graphify:
    name: Graphify智囊团
    description: Graphify智囊团 - 第二大脑核心引擎，提供深度分析、关联发现、趋势洞察、决策支持、执行链审计
    specialists:
    - strategist
    - relation_discovery
    - trend_watcher
    - decision_advisor
    - execution_auditor
    - ai_tech_researcher
    - evolution_engine
    capabilities:
    - 战略分析
    - 关联发现
    - 趋势洞察
    - 决策支持
    - 知识图谱
    - 预测分析
    - 执行链审计
    - 任务分级
    - 跨会话状态管理
    - AI技术前沿追踪
    - 每日技术情报
    - 体系自进化闭环协调
    - Agent能力GAP分析与进化规划
    access_key: graphify
  hr:
    name: HR管理团队
    description: HR团队 - 负责AI Agent全生命周期管理，包含入职审批、能力评审、能力进化、退役管理，确保Agent团队持续专业化
    specialists:
    - hr_director
    - capability_architect
    capabilities:
    - Agent入职审批（Schema完整性+能力质量双检）
    - Agent定期评审（5维度评分制）
    - 能力描述质量管控（A/B/C分级，C级不合格）
    - 团队编制规划与审批
    - Agent退役流程管理
    - 跨团队能力图谱维护
    - 能力进化路径设计
    - Agent Prompt/Backstory工程
    access_key: hr
  harness_ops:
    name: 驾驭运维团队 (Harness Ops)
    description: Harness Ops团队 - 负责AI团队Harness体系的配置维护、代码开发、知识沉淀和质量保证。情报行动管线的专属执行团队。
    specialists:
    - harness_engineer
    - ai_systems_dev
    - knowledge_engineer
    - integration_qa
    capabilities:
    - Harness Configuration 维护
    - 执行链/决策链设计与优化
    - AI系统代码开发(hr_base.py)
    - 自动化脚本与管线开发
    - 方法论文档与知识沉淀
    - 变更验证与集成测试
    - QA自动评分与质量门禁
    access_key: harness_ops
  growth:
    name: 增长团队
    description: 增长团队 - 负责市场洞察、客户发现、竞争情报和GTM策略，打通外部信号与内部执行闭环
    specialists:
    - customer_insights_manager
    - gtm_strategist
    - sales_enablement
    - community_manager
    capabilities:
    - 客户需求调研与验证
    - 市场反馈汇总分析
    - 竞品跟踪与竞争定位
    - GTM策略设计
    - 销售赋能材料制作与提案撰写
    - 内容ROI提升
    - 开源社区运营与开发者关系
    - B2B销售漏斗管理
    access_key: growth
