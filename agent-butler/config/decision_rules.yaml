    "培训":
      - training_expert
    "交付":
      - delivery_expert
    "PMO":
      - pmo_expert
    "IoT":
      - iot_expert
    "物联网":
      - iot_expert
    "传感器":
      - iot_data_expert
    "数据":
      - iot_data_expert
    "建模":
      - digital_modeling_expert
    "UAT":
      - uat_test_expert
    "测试":
      - uat_test_expert
    "验收":
      - uat_test_expert
    # OBS团队专家
    "知识库":
      - obs_architecture_expert
    "OBS":
      - obs_architecture_expert
    "知识架构":
      - obs_architecture_expert
    "标签体系":
      - obs_architecture_expert
    "链接结构":
      - obs_architecture_expert
    "沉淀":
      - knowledge_chandu_expert
    "萃取":
      - knowledge_chandu_expert
    "SOP":
      - knowledge_chandu_expert
    "复盘":
      - knowledge_chandu_expert
    "检索":
      - knowledge_search_expert
    "搜索":
      - knowledge_search_expert
    "推荐":
      - knowledge_search_expert
    "质量":
      - knowledge_quality_expert
    "审核":
      - knowledge_quality_expert
    "去重":
      - knowledge_quality_expert
    "归档":
      - knowledge_quality_expert
    # 执行链审计
    "分级":
      - execution_auditor
    "执行链":
      - execution_auditor
    "合规":
      - execution_auditor

  # 自动组合规则
  auto_combinations:
    - { keywords: ["IoT", "数据"], experts: ["iot_expert", "iot_data_expert"] }
    - { keywords: ["PMO", "交付"], experts: ["pmo_expert", "delivery_expert"] }
    - { keywords: ["UAT", "IoT"], experts: ["uat_test_expert", "iot_expert", "iot_data_expert"] }
    - { keywords: ["知识库", "架构"], experts: ["obs_architecture_expert", "knowledge_chandu_expert"] }
    - { keywords: ["项目", "沉淀"], experts: ["knowledge_chandu_expert", "obs_architecture_expert"] }
    - { keywords: ["决策", "分析"], experts: ["decision_advisor", "strategist", "execution_auditor"] }

# ============================================================================
# 知识库配置
# ============================================================================
knowledge_base:
  decision_history_dir: "${DECISION_LOGS_DIR:-./logs/decisions}"
  discussion_history_dir: "${DISCUSSION_LOGS_DIR:-./logs/phase2}"
  max_similar_cases: 3
  similarity_threshold: 0.7
  obs_knowledge_base:
    root: "${OBS_KB_ROOT:-../obs}"
    structures:
      - "01-team-knowledge"
      - "02-project-knowledge"
      - "03-process-knowledge"
      - "04-decision-knowledge"
      - "05-industry-knowledge"

# ============================================================================
# 权限配置（v2.0 — 最小化总裁参与）
# ============================================================================
permissions:
  auto_approve:  # L1
    - "专家方案审核"
    - "任务分配"
    - "标准流程执行"
    - "内部协调"
    - "信息查询"

  lysander_approve:  # L2
    - "新方案首次执行"
    - "跨团队协调"
    - "风险可控变更"
    - "团队扩编"

  expert_review:  # L3
    - "重大方案设计"
    - "高风险技术变更"
    - "战略方向调整"
    - "组织架构调整"
    - "新领域进入"

  president_only:  # L4
    - "外部合同签署"
    - "预算 > 100万"
    - "公司存续级决策"
    - "总裁指定汇报事项"
